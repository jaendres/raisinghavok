name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC federated login — no stored credentials
  contents: read

concurrency: deploy

env:
  RESOURCE_GROUP: tcg-business-rg
  APP_NAME: raisinghavok

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP \
            --template-file infra/main.bicep \
            --parameters appName=$APP_NAME \
              recaptchaSiteKey='${{ secrets.RECAPTCHA_SITE_KEY }}' \
              recaptchaSecret='${{ secrets.RECAPTCHA_SECRET }}' \
              leagueApiKey='${{ secrets.LEAGUE_API_KEY }}' \
              discordClientId='${{ secrets.DISCORD_CLIENT_ID }}' \
              discordClientSecret='${{ secrets.DISCORD_CLIENT_SECRET }}' \
            --output none

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Package app
        run: zip -rq app.zip server public package.json node_modules

      # Async + poll: the synchronous client often 504s at the gateway while
      # Kudu keeps deploying, marking green runs red. Poll Kudu for the truth.
      - name: Deploy app
        run: |
          # Kudu 429s if a prior deployment is still settling — retry the submit.
          for attempt in 1 2 3 4; do
            if az webapp deploy \
              --resource-group $RESOURCE_GROUP \
              --name $APP_NAME \
              --src-path app.zip --type zip --async true \
              --output none; then
              break
            fi
            if [ "$attempt" = "4" ]; then echo "Submit failed after 4 attempts"; exit 1; fi
            echo "Submit failed (attempt $attempt), retrying in 60s..."
            sleep 60
          done
          echo "Polling deployment status (up to 30 min — Kudu can be slow)..."
          for i in $(seq 1 90); do
            state=$(az rest --method get \
              --url "https://$APP_NAME.scm.azurewebsites.net/api/deployments/latest" \
              --resource "https://management.azure.com" -o json 2>/dev/null || echo '{}')
            complete=$(echo "$state" | jq -r '.complete // false')
            status=$(echo "$state" | jq -r '.status // 0')
            if [ "$complete" = "true" ]; then
              if [ "$status" = "4" ]; then echo "Deployment succeeded."; exit 0; fi
              echo "Deployment failed (Kudu status $status)"; exit 1
            fi
            sleep 20
          done
          # Kudu never reported — fall back to asking the app itself
          echo "Poll timed out; checking site health as the verdict..."
          sleep 60
          if curl -sf --retry 3 --retry-delay 20 "https://$APP_NAME.azurewebsites.net/api/config" > /dev/null; then
            echo "Site is healthy — treating deployment as succeeded."; exit 0
          fi
          echo "Site unhealthy after timeout."; exit 1

      - name: Smoke test
        run: |
          sleep 20
          curl -sSf --retry 5 --retry-delay 10 --retry-all-errors \
            "https://$APP_NAME.azurewebsites.net/api/parts" > /dev/null
          echo "Site is up: https://$APP_NAME.azurewebsites.net"
